<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Vite replaces %BASE_URL% with your `base` at build time -->
    <base href="%BASE_URL%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Summit Sites</title>

    <!-- Preload logo from public/ so Safari has it on first paint AND refresh.
         Because of <base>, "assets/..." resolves to "%BASE_URL%assets/..." -->
    <link rel="preload" as="image" href="assets/Summit_Sites_Logo_Optimized.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Your app entry -->
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
